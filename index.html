<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Worlds Editor</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">SW</span>
        <div>
          <h1>Story Worlds</h1>
          <p>Editor de continuidad narrativa</p>
        </div>
      </div>

      <nav class="tool-list" aria-label="Secciones principales">
        <button class="tool active">Proyecto</button>
        <button class="tool">Terreno</button>
        <button class="tool">Agua</button>
        <button class="tool">Biomas</button>
        <button class="tool">Lugares</button>
        <button class="tool">Escenas</button>
        <button class="tool">Cámaras</button>
        <button class="tool">Exportar</button>
      </nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Milestone 1</p>
          <h2>Core Canvas</h2>
        </div>
        <div class="actions">
          <button>Guardar</button>
          <button class="primary">Nueva escena</button>
        </div>
      </header>

      <section class="canvas-panel" aria-label="Vista 3D del editor">
        <div id="worldCanvas" class="world-canvas"></div>
        <div class="canvas-note">
          <strong>Core Canvas</strong>
          <span>Escena, cámara, luz, terreno y marcador inicial.</span>
        </div>
      </section>

      <footer class="statusbar">
        <span>Estado: escena 3D inicial</span>
        <span>Herramienta: Proyecto</span>
        <span>Autosave: pendiente</span>
      </footer>
    </section>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
